# Horizon Contracts Dev Override (contracts only, no subgraph)
# Mounts local contracts repo for graph-contracts-horizon only.
# Unlike graph-contracts.yaml, does NOT override subgraph-deploy.
#
# Activate via COMPOSE_FILE in .env:
#   COMPOSE_FILE=docker-compose.yaml:compose/dev/graph-contracts-only.yaml

services:
  graph-contracts-horizon:
    volumes:
      - ${CONTRACTS_SOURCE_ROOT:?Set CONTRACTS_SOURCE_ROOT to local contracts repo}:/opt/contracts
